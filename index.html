<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoTax – Rechnungsverwaltung</title>

<link rel="stylesheet" href="style.css">

<style>

.upload-panel{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
padding:20px;
}

.upload-zone{
width:100%;
max-width:500px;
border:2px dashed #ccc;
border-radius:10px;
padding:40px;
text-align:center;
cursor:pointer;
background:#fafafa;
}

.upload-zone:hover{
background:#f2f2f2;
}

.upload-zone input{
display:none;
}

#uploadBtn{
margin-top:10px;
padding:12px 22px;
font-size:16px;
cursor:pointer;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
}

#uploadBtn:hover{
background:#43a047;
}

.progress-bar{
width:100%;
max-width:500px;
height:8px;
background:#eee;
border-radius:4px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:#4caf50;
}

.app-header{
display:flex;
justify-content:space-between;
padding:20px;
background:#222;
color:white;
}

.logo{
font-size:20px;
font-weight:bold;
}

.subtitle{
margin-left:10px;
opacity:0.7;
}

.table-wrapper{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

</style>

</head>

<body>

<div class="app-wrapper">

<header class="app-header">

<div>
<span class="logo">AutoTax</span>
<span class="subtitle">OCR Rechnungsverwaltung</span>
</div>

<div>
<span id="statusText">Bereit</span>
</div>

</header>


<section class="panel upload-panel">

<div class="upload-zone" id="dropZone">

<input type="file" id="fileInput" multiple accept="image/*,.pdf">

<p><strong>Rechnung oder PDF hierher ziehen</strong></p>

<p>
<label for="fileInput">
Datei auswählen
</label>
</p>

<small>JPG, PNG oder PDF</small>

</div>


<button id="uploadBtn">
Hochladen & OCR starten
</button>


<div id="uploadProgress" class="progress-bar" style="display:none">
<div id="progressFill" class="progress-fill"></div>
</div>

</section>


<div class="table-wrapper">

<table id="invoiceTable">

<thead>

<tr>

<th>Datei</th>
<th>Firma</th>
<th>Datum</th>
<th>Betrag</th>
<th>MwSt</th>

</tr>

</thead>

<tbody id="tableBody">

<tr>

<td colspan="5">
Noch keine Rechnungen vorhanden – bitte Datei hochladen.
</td>

</tr>

</tbody>

</table>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
